<!DOCTYPE html>
<html>
<head>
    <title>Christopher Champagne | M.A.P</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
        }

        h1 {
            font-size: 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background: #1c1c1c;
            padding: 25px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 18px;
        }

        .card:hover {
            background: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Christopher Champagne</h1>
    <p>M.A.P — My Accountability Program</p>

    <div class="grid">
        <a class="card">👨‍👩‍👦 FAMILY</a>
        <a class="card">✈️ FREEFLIGHT</a>
        <a class="card">💪 FITNESS</a>
        <a class="card">🎯 FUN</a>
        <a class="card">⚡ PROFESSIONAL</a>
    </div>

    <p style="margin-top:40px;">
        Built in real time.
    </p>

</div>

</body>
</html>
